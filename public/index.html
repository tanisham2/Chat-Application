<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="chat-container">
    <div id="sidebar">
      <div id="sidebar-top">
        <input type="text" id="search-input" placeholder="Search users..." />
        <ul id="search-results" class="hidden"></ul>
        
        <div class="sidebar-section-title"> Friends </div>
        <ul id="user-list"></ul>
        
        <div id="pending-requests-toggle" class="sidebar-section-title clickable">
          Pending Requests <span id="pending-count" class="badge hidden">0</span>
        </div>
      </div>
      
      <div id="profile-bar">
        <div id="profile-bar-info">
          <div id="my-avatar" class="avatar-circle"></div>
          <strong id="my-username"></strong>
        </div>
        <div id="profile-bar-actions">
          <button id="theme-toggle-btn" title="Toggle theme">🌙</button>
          <button id="profile-btn" title="Edit profile">Profile</button>
          <button id="logout-btn" title="Logout">Logout</button>
        </div>
      </div>
    </div>

    <div id="chat-area">
      <div id="chat-header">
        <strong id="chat-with">Select a user to chat</strong>
        <div id="pinned-bar" class="hidden"></div>
      </div>

      <ul id="messages"></ul>
      <div id="typing-indicator"></div>
      <div id="reply-preview" class="hidden">
        <span id="reply-preview-text"></span>
        <span id="reply-cancel-btn">✕</span>
      </div>

      <form id="form">
        <label id="image-label" for="image-input">📷</label>
        <input type="file" id="image-input" accept="image/*" />
        <button type="button" id="emoji-btn">😊</button>

        <emoji-picker id="emoji-picker" class="hidden"></emoji-picker>
        <input id="input" autocomplete="off" placeholder="Type a message..." />
        <button type="button" id="voice-btn">🎤</button>
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <div id="profile-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3> Edit Profile </h3>
      
      <div class="avatar-upload-wrap">
      <label for="profile-avatar-input" class="avatar-preview" id="profile-avatar-preview">+</label>
      <input type="file" id="profile-avatar-input" accept="image/*" style="display:none" />
      <span class="avatar-upload-hint">Click to change photo</span>
    </div>

    <input type="text" id="profile-username" placeholder="Username" />
    <div class="modal-actions">
      <button id="profile-save-btn">Save</button>
      <button id="profile-close-btn">Cancel</button>
    </div>
  </div>
</div>

<div id="forward-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3> Forward to </h3>
    <ul id="forward-user-list"></ul>
    <div class="modal-actions">
      <button id="forward-close-btn">Cancel</button>
    </div>
  </div>
</div>

<div id="pending-panel" class="side-panel hidden">
  <div class="side-panel-header">
    <h3>Pending Requests</h3>
    <span id="pending-panel-close">✕</span>
  </div>
  <ul id="pending-list"></ul>
</div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
  <script src="/js/chat.js"></script>

</body>
</html>
