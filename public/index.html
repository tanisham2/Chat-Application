<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="chat-container">
    <div id="sidebar">
      <div id="profile-bar">
        <strong id="my-username"></strong>
        <div>
          <button id="theme-toggle-btn">🌙</button>
          <button id="profile-btn">Profile</button>
          <button id="logout-btn">Logout</button>
        </div>
      </div>
      <input type="text" id="search-input" placeholder="Search users..." />
      <ul id="user-list"></ul>
    </div>

    <div id="chat-area">
      <div id="chat-header">
        <strong id="chat-with">Select a user to chat</strong>
        <div id="pinned-bar" class="hidden"></div>
      </div>

      <ul id="messages"></ul>
      <div id="typing-indicator"></div>
      <div id="reply-preview" class="hidden">
        <span id="reply-preview-text"></span>
        <span id="reply-cancel-btn">✕</span>
      </div>

      <form id="form">
        <label id="image-label" for="image-input">📷</label>
        <input type="file" id="image-input" accept="image/*" />
        <button type="button" id="emoji-btn">😊</button>

        <emoji-picker id="emoji-picker" class="hidden"></emoji-picker>
        <input id="input" autocomplete="off" placeholder="Type a message..." />
        <button type="button" id="voice-btn">🎤</button>
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <div id="profile-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <h3>Edit Profile</h3>
      <input type="text" id="profile-username" placeholder="Username" />
      <input type="text" id="profile-avatar" placeholder="Avatar URL (optional)" />
      <div class="modal-actions">
        <button id="profile-save-btn">Save</button>
        <button id="profile-close-btn">Cancel</button>
      </div>
    </div>
  </div>

<div id="forward-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3> Forward to </h3>
    <ul id="forward-user-list"></ul>
    <div class="modal-actions">
      <button id="forward-close-btn">Cancel</button>
    </div>
  </div>
</div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
  <script src="/js/chat.js"></script>

</body>
</html>
