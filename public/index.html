<!DOCTYPE html>
<html>
<head>
  <title>Chat Application</title>
  <style>
  body {
    margin: 0;
    background-color: #b0aee9;
    padding: 20px;
    font-family: Arial, sans-serif;
  }
  #chat-container {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
  }
  #typing-indicator {
    color: #666;
    font-style: italic;
    font-size: 0.9em;
    padding: 5px 10px;
    display: none;
   }
  .typing {
    color: #666;
    font-size: 0.8em;
    font-style: italic;
   }
   #user-list {
    list-style: none;
    padding: 0;
    margin: 10px 0;
   }
   #user-list li {
    padding: 5px 10px;
    border-radius: 3px;
    margin: 2px 0;
   }

   #user-list li:hover {
    background-color: #f0f0f0;
   }
  #sidebar {
    width: 250px;
    padding: 20px;
    background-color: #f5f5f5;
    border-right: 1px solid #ddd;
  }
  #chat-area {
    flex: 1;
    padding: 20px;
  }
  .room {
    padding: 8px;
    cursor: pointer;
    border-radius: 4px;
    margin: 4px 0;
  }
  .room:hover {
    background-color: #e9e9e9;
  }
  .room.active {
    background-color: #1a0bf3;
    color: white;
  }
  #create-room {
    margin-top: 20px;
  }
  #new-room {
    width: 100%;
    padding: 8px;
    margin-bottom: 8px;
  }
  #create-room-btn {
    width: 100%;
    padding: 8px;
    background-color: #1a0bf3;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  #create-room-btn:hover {
    background-color: #1a0bf3;
  }
  #messages {
    list-style-type: none;
    margin: 0;
    background-color: #efeaea;
    padding: 0;
    margin-bottom: 20px;
    border: 1px solid #1a0bf3;
    padding: 10px;
    height: 400px;
    overflow-y: auto;
    }
    .system-message {
    color: #666;
    font-style: italic;
    font-size: 0.9em;
  }
    #messages li {
      padding: 8px 16px;
      border-bottom: 1px solid #1a0bf3;
    }
    #messages li:last-child {
      border-bottom: none;
    }
    #form {
      display: flex;
      margin-top: 10px;
    }
    #input {
      flex-grow: 1;
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      background: #1a0bf3;
      color: white;
      border: none;
      cursor: pointer;
      margin-left: 10px;
      }
    button:hover {
      background: #1a0bf3;
    }
  </style>
</head>
<body>
  <h1>Chat Application</h1>
  
  <div id="username-container">
    <input type="text" id="username-input" placeholder="Enter your username" />
    <button id="set-username">Set Username</button>
  </div>

  <div id="chat-container">
    <div id="sidebar">
        <h3>Rooms</h3>
        <ul id="room-list">
            <li class="room active" data-room="general">General</li>
            <li class="room" data-room="random">Random</li>
        </ul>
        <div id="create-room">
            <input type="text" id="new-room" placeholder="New room name" />
            <button id="create-room-btn">Create Room</button>
        </div>

        <h3>Users in Room</h3>
        <ul id="user-list">
     <!-- User list will be populated here -->
        </ul>
    </div>
    <div id="chat-area">
      <div id="typing-indicator"></div>
        <ul id="messages"></ul>

        <form id="form">
            <input id="input" autocomplete="off" placeholder="Type a message..."/>
            <button>Send</button>
        </form>
      </div>
    </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');

    const roomList = document.getElementById('room-list');
    const newRoomInput = document.getElementById('new-room');
    const createRoomBtn = document.getElementById('create-room-btn');
    let currentRoom = 'general';
    
    const usernameInput = document.getElementById('username-input');
    const setUsernameBtn = document.getElementById('set-username');
    let currentUsername = 'Anonymous';

  const userList = document.getElementById('user-list');
   const typingIndicator = document.getElementById('typing-indicator');
   const messageInput = document.getElementById('input');
   let typingTimeout;

    setUsernameBtn.addEventListener('click', () => {
        const newUsername = usernameInput.value.trim();
        if (newUsername) {
            socket.emit('set username', newUsername);
            currentUsername = newUsername;
            usernameInput.value = '';
        }
    });

   form.addEventListener('submit', (e) => {
     e.preventDefault();
     if (messageInput.value.trim()) {
         socket.emit('chat message', {
            message: messageInput.value,
            room: currentRoom
         });
         messageInput.value = '';
        
         // Clear typing status
         if (typingTimeout) {
            clearTimeout(typingTimeout);
            typingTimeout = null;
            socket.emit('typing', false);
         }
     }
   });

    roomList.addEventListener('click', (e) => {
        if (e.target.classList.contains('room')) {
            const room = e.target.dataset.room;
            socket.emit('join room', room);
            currentRoom = room;
            document.querySelectorAll('.room').forEach(r => r.classList.remove('active'));
            e.target.classList.add('active');
        }
    });

    // Create new room
    createRoomBtn.addEventListener('click', () => {
        const roomName = newRoomInput.value.trim();
        if (roomName && !document.querySelector(`[data-room="${roomName}"]`)) {
            socket.emit('create room', roomName);
            newRoomInput.value = '';
        }
    });

       // Handle typing events
   messageInput.addEventListener('input', () => {
     // User is typing
     if (!typingTimeout) {
         socket.emit('typing', true);
     }
    
     // Clear previous timeout
     clearTimeout(typingTimeout);
    
     // Set a timeout to indicate user stopped typing
     typingTimeout = setTimeout(() => {
         socket.emit('typing', false);
         typingTimeout = null;
     }, 1000);
   });
        
    // Update message display to show usernames
    socket.on('chat message', (data) => {
        const item = document.createElement('li');
        item.innerHTML = `<strong>${data.username}:</strong> ${data.message}`;
        messages.appendChild(item);
        messages.scrollTop = messages.scrollHeight;
    });

    // Handle user join notifications
    socket.on('user joined', (data) => {
        const item = document.createElement('li');
        item.className = 'system-message';
        if (data.oldUsername === 'Anonymous') {
            item.textContent = `${data.newUsername} has joined the chat`;
        } else {
            item.textContent = `${data.oldUsername} is now known as ${data.newUsername}`;
        }
        messages.appendChild(item);
        messages.scrollTop = messages.scrollHeight;
    });

        // Handle new room creation
    socket.on('room created', (roomName) => {
        const roomItem = document.createElement('li');
        roomItem.className = 'room';
        roomItem.dataset.room = roomName;
        roomItem.textContent = roomName;
        roomList.appendChild(roomItem);
    });

    // Handle room join confirmation
    socket.on('joined room', (room) => {
        const item = document.createElement('li');
        item.className = 'system-message';
        item.textContent = `You joined ${room}`;
        messages.appendChild(item);
        currentRoom = room;
        messages.scrollTop = messages.scrollHeight;
    });

        // Handle room messages
    socket.on('room message', (data) => {
        const item = document.createElement('li');
        item.className = 'system-message';
        item.textContent = data.message;
        messages.appendChild(item);
        messages.scrollTop = messages.scrollHeight;
    });

    // Handle user leave notifications
    socket.on('user left', (data) => {
        const item = document.createElement('li');
        item.className = 'system-message';
        item.textContent = `${data.username} has left the chat`;
        messages.appendChild(item);
        messages.scrollTop = messages.scrollHeight;
    });

     // Update user list
   socket.on('user list', (data) => {
     if (data.room === currentRoom) {
         userList.innerHTML = '';
         data.users.forEach(user => {
            const userItem = document.createElement('li');
            userItem.textContent = user.username;
            if (user.isTyping) {
               userItem.innerHTML += ' <span class="typing">typing...</span>';
            }
            userList.appendChild(userItem);
         });
     }
   });

   // Update typing indicator
   socket.on('typing users', (usernames) => {
     const typingUsers = usernames.filter(u => u !== currentUsername);
     if (typingUsers.length > 0) {
         typingIndicator.textContent = `${typingUsers.join(', ')} ${typingUsers.length > 1 ? 'are' : 'is'} typing...`;
         typingIndicator.style.display = 'block';
     } else {
         typingIndicator.style.display = 'none';
     }
   });
    </script>
</body>
</html>
