<!DOCTYPE html>
<html>
<head>
  <title>Register - Chat App</title>
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <h2>Create your account</h2>
    <p class="auth-subtitle"> Join & start chatting in seconds!🥰 </p>

    <div id="banner" class="banner-msg"></div>

    <div class="avatar-upload-wrap">
      <div class="avatar-preview-wrap">
        <label for="avatar-input" class="avatar-preview" id="avatar-preview">+
          <div class="avatar-overlay">  Change </div>
        </label>
      </div>
      <input type="file" id="avatar-input" accept="image/*" style="display:none" />
      <span class="avatar-upload-hint"> Add profile photo (optional) </span>
    </div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" class="auth-input" placeholder="Choose a username" />
      <span class="field-error" id="username-error"></span>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" class="auth-input" placeholder="you@example.com" />
      <span class="field-error" id="email-error"></span>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" class="auth-input" placeholder="Create a password" />
        <button type="button" class="password-toggle" id="toggle-password">👁️</button>
      </div>
      <div class="strength-meter">
        <div class="strength-bar" id="bar1"></div>
        <div class="strength-bar" id="bar2"></div>
        <div class="strength-bar" id="bar3"></div>
        <div class="strength-bar" id="bar4"></div>
      </div>
      <span class="strength-label" id="strength-label"></span>
      <span class="field-error" id="password-error"></span>
    </div>

    <div class="form-group">
      <label for="confirm-password">Confirm Password</label>
      <div class="input-wrap">
        <input type="password" id="confirm-password" class="auth-input" placeholder="Re-enter your password" />
        <button type="button" class="password-toggle" id="toggle-confirm-password">👁️</button>
      </div>
      <span class="field-error" id="confirm-password-error"></span>
    </div>

    <button id="register-btn" class="auth-btn">Register</button>

    <p class="auth-footer">Already have an account? <a href="/login.html">Login</a></p>
  </div>
  <script src="/js/register.js"></script>
</body>
</html>
