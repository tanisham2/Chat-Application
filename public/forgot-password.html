<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password: Chat App</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-container">
    <h2> Forgot Password </h2>
    <p id="error-msg" class="error-text"></p>
    <p id="success-msg" class="success-text"></p>

    <div id="step-email">
      <input type="email" id="email-input" placeholder="Enter your email" />
      <button id="send-otp-btn"> Send OTP </button>
    </div>

    <div id="step-otp" class="hidden">
      <input type="text" id="otp-input" placeholder="Enter OTP" />
      <button id="verify-otp-btn"> Verify OTP </button>
    </div>

    <div id="step-reset" class="hidden">
      <input type="password" id="new-password-input" placeholder="New password" />
      <button id="reset-password-btn"> Update Password </button>
    </div>

    <p><a href="/login.html">Back to Login</a></p>
  </div>
  <script src="/js/forgot-password.js"></script>
</body>
</html>
