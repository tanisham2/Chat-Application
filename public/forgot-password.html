<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password: Chat App</title>
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <h2> Reset your password </h2>
    <p class="auth-subtitle"> We'll help you get back in!😁</p>

    <div class="step-indicator">
      <div class="step-circle active" id="step-circle-1">1</div>
      <div class="step-line" id="line-1"></div>
      <div class="step-circle" id="step-circle-2">2</div>
      <div class="step-line" id="line-2"></div>
      <div class="step-circle" id="step-circle-3">3</div>
    </div>

    <div id="banner" class="banner-msg"></div>

    <div class="auth-step active" id="step-email">
      <div class="form-group">
        <label for="email-input">Email</label>
        <input type="email" id="email-input" class="auth-input" placeholder="you@example.com" />
        <span class="field-error" id="email-error"></span>
      </div>
      <button id="send-otp-btn" class="auth-btn">Send OTP</button>
    </div>

    <div class="auth-step" id="step-otp">
      <div class="form-group">
        <label for="otp-input">Enter OTP</label>
        <input type="text" id="otp-input" class="auth-input" placeholder="6-digit code" maxlength="6" />
        <span class="field-error" id="otp-error"></span>
      </div>
      <button id="verify-otp-btn" class="auth-btn">Verify OTP</button>
    </div>

    <div class="auth-step" id="step-reset">
      <div class="form-group">
        <label for="new-password-input">New Password</label>
        <div class="input-wrap">
          <input type="password" id="new-password-input" class="auth-input" placeholder="Create a new password" />
          <button type="button" class="password-toggle" id="toggle-new-password">👁️</button>
        </div>
        <div class="strength-meter">
          <div class="strength-bar" id="bar1"></div>
          <div class="strength-bar" id="bar2"></div>
          <div class="strength-bar" id="bar3"></div>
          <div class="strength-bar" id="bar4"></div>
        </div>
        <span class="strength-label" id="strength-label"></span>
        <span class="field-error" id="new-password-error"></span>
      </div>
      <div class="form-group">
        <label for="confirm-new-password-input">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="confirm-new-password-input" class="auth-input" placeholder="Re-enter new password" />
          <button type="button" class="password-toggle" id="toggle-confirm-new-password">👁️</button>
        </div>
        <span class="field-error" id="confirm-new-password-error"></span>
      </div>
      <button id="reset-password-btn" class="auth-btn">Update Password</button>
    </div>

    <p class="auth-footer"><a href="/login.html">Back to Login</a></p>
  </div>
  <script src="/js/forgot-password.js"></script>
</body>
</html>
